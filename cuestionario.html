<!-- FORMULARIO -->
<div class="container py-5">

  <h1 class="text-center mb-5">Formulario de Inscripción</h1>

  <form id="formInscripcion">

    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" id="nombre" class="form-control" placeholder="Ingrese su nombre" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <input type="email" id="correo" class="form-control" placeholder="ejemplo@gmail.com" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Curso de interés</label>
      <select id="curso" class="form-control" required>
        <option value="">Seleccione un curso</option>
        <option>Repostería</option>
        <option>Cocina Internacional</option>
        <option>Cocina Vegetariana</option>
        <option>Panadería</option>
      </select>
    </div>

    <button type="submit" class="btn btn-success w-100">
      Inscribirse
    </button>

  </form>

  <!-- MENSAJE -->
  <div id="mensaje" class="text-center mt-4 fw-bold"></div>

</div>

<!-- FOOTER -->
<footer class="text-center bg-dark text-white py-4">
  © 2026 Cooking Academy
</footer>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- SCRIPT -->
<script>
document.getElementById("formInscripcion").addEventListener("submit", function(e){
    e.preventDefault();

    document.getElementById("mensaje").innerText = "Inscrito correctamente ✔️";

    this.reset();
});
</script>
